<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HaptechZone Games</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0d0d12;
        color: white;
    }

    h1 {
        text-align: center;
        margin-top: 20px;
        font-size: 34px;
        color: #6cb4ff;
        text-shadow: 0 0 8px #1e90ff;
    }

    /* FILTERS */
    #filters {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        justify-content: center;
        margin: 20px auto;
        padding: 10px;
        max-width: 900px;
    }

    #filters input, #filters select {
        padding: 10px;
        border-radius: 6px;
        border: none;
        outline: none;
        font-size: 15px;
    }

    /* PS5 STYLE CATEGORY BUTTONS */
    .filter-btn {
        padding: 10px 18px;
        font-size: 15px;
        border-radius: 20px;
        background: linear-gradient(145deg, #1f2a3d, #0f1623);
        border: 1px solid #6cb4ff;
        color: #cfe6ff;
        cursor: pointer;
        transition: 0.25s ease;
        box-shadow: 0 0 8px #1e90ff55;
    }

    .filter-btn:hover,
    .filter-btn.active {
        background: linear-gradient(145deg, #2d415d, #122033);
        color: white;
        box-shadow: 0 0 16px #1e90ff;
        transform: translateY(-2px);
    }

    /* VIEW TOGGLE */
    #viewToggle {
        text-align: center;
        margin-top: 10px;
    }

    #viewToggle button {
        padding: 8px 14px;
        border-radius: 10px;
        border: none;
        cursor: pointer;
        background: #1e90ff;
        color: white;
        margin: 0 6px;
    }

    /* GRID CARDS */
    #cardView {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 180px));
    justify-content: center;
    gap: 20px;
    }

    .game-card {
    width: 180px;
    background: #10141c;
    border-radius: 12px;
    overflow: hidden;
    position: relative;
    box-shadow: 0 0 8px #1e90ff33;
    transition: transform 0.25s;
    }

    .game-card:hover {
        transform: scale(1.03);
    }

    .game-cover {
    width: 180px;
    height: 270px;
    object-fit: cover;
        background: #0a0a0a;
    }

    .game-info {
        padding: 12px;
        font-size: 16px;
    }

    .game-title {
        font-weight: bold;
        color: #6cb4ff;
        font-size: 18px;
    }

    .price-tag {
        margin-top: 6px;
        color: #9ee0ff;
    }

    /* HOVER OVERLAY (PS5 STYLE) */
    .overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(28, 80, 175, 0.55);
        backdrop-filter: blur(2px);
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 22px;
        color: white;
        text-shadow: 0 0 8px white;
        opacity: 0;
        transition: 0.25s ease-in-out;
    }

    .game-card:hover .overlay {
        opacity: 1;
    }

    /* TABLE VIEW */
    #tableView {
        display: none;
        width: 95%;
        margin: auto;
        padding: 20px;
    }

    table {
        width: 100%;
        border-collapse: collapse;
        color: #d8e7ff;
    }

    th, td {
        padding: 10px;
        border-bottom: 1px solid #1e90ff33;
        text-align: left;
    }

</style>
</head>
<body>

<h1>HaptechZone Game List</h1>

<div id="filters">
    <input id="searchInput" type="text" placeholder="Search games..." oninput="applyFilters()">

    <select id="priceFilter" onchange="applyFilters()">
        <option value="All">All Prices</option>
        <option value="50">₱50</option>
        <option value="150">₱150</option>
        <option value="250">₱250</option>
    </select>

    <!-- CATEGORY BUTTONS -->
    <button class="filter-btn active" onclick="setCategory('All')">All</button>
    <button class="filter-btn" onclick="setCategory('RPG')">RPG</button>
    <button class="filter-btn" onclick="setCategory('Fighting')">Fighting</button>
    <button class="filter-btn" onclick="setCategory('Indie')">Indie</button>
    <button class="filter-btn" onclick="setCategory('Anime')">Anime</button>
</div>

<div id="viewToggle">
    <button onclick="showCards()">Card View</button>
    <button onclick="showTable()">Table View</button>
</div>

    <div>
        <hr style = "border-top: 3px solid red; margin-top:20px">
    </div>

<!-- CARD VIEW -->
<div id="cardView"></div>

<!-- TABLE VIEW -->
<div id="tableView">
<table>
<thead>
<tr>
<th>Name</th>
<th>Category</th>
<th>Status</th>
<th>Fix</th>
<th>Price</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>
let games = [];
let selectedCategory = "All";

function setCategory(cat) {
    selectedCategory = cat;

    document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    applyFilters();
}

function showCards() {
    cardView.style.display = "grid";
    tableView.style.display = "none";
}

function showTable() {
    cardView.style.display = "none";
    tableView.style.display = "block";
}

/* LOAD GOOGLE SHEET */
async function loadData() {
    const url = "https://docs.google.com/spreadsheets/d/1LMTiIt9qwhdCwDNC5dWl49AIg6dH3gAr_0nqcOr1kOc/gviz/tq?tqx=out:json&gid=0";
    const res = await fetch(url);
    const text = await res.text();
    const json = JSON.parse(text.substring(47, text.length - 2));

    games = json.table.rows.map(r => ({
    name: r.c[0]?.v || "",
    category: r.c[1]?.v || "",
    status: r.c[2]?.v || "",
    fix: r.c[3]?.v || "",
    price: r.c[4]?.v || "",
    cover: r.c[5]?.v || ""
}));

    renderCards(games);
    renderTable(games);
}

function applyFilters() {
    const search = document.getElementById("searchInput").value.toLowerCase();
    const price = document.getElementById("priceFilter").value;

    const filtered = games.filter(g => {
        const matchSearch = g.name.toLowerCase().includes(search);
        const matchCat = selectedCategory === "All" || g.category === selectedCategory;
        const matchPrice = price === "All" || Number(g.price) === Number(price);

        return matchSearch && matchCat && matchPrice;
    });

    renderCards(filtered);
    renderTable(filtered);
}

/* RENDER CARD GRID */
function renderCards(list) {
    cardView.innerHTML = "";

    list.forEach(g => {
        const card = document.createElement("div");
        card.className = "game-card";

        const img = document.createElement("img");
        img.className = "game-cover";
        img.src = g.cover || "https://via.placeholder.com/300x450?text=No+Cover";

        const info = document.createElement("div");
        info.className = "game-info";
        info.innerHTML = `
            <div class="game-title">${g.name}</div>
            <div class="price-tag">₱${g.price}</div>
        `;

        const overlay = document.createElement("div");
        overlay.className = "overlay";
        overlay.textContent = `Status: ${g.status}`;

        card.appendChild(img);
        card.appendChild(info);
        card.appendChild(overlay);

        cardView.appendChild(card);
    });
}

/* RENDER TABLE */
function renderTable(list) {
    tableBody.innerHTML = "";
    list.forEach(g => {
        tableBody.innerHTML += `
            <tr>
                <td>${g.name}</td>
                <td>${g.category}</td>
                <td>${g.status}</td>
                <td>${g.fix}</td>
                <td>${g.price}</td>
            </tr>
        `;
    });
}

loadData();
</script>

</body>
</html>
